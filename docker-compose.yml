services:
  postgres:
    image: postgres:15
    container_name: oral-postgres
    environment:
      POSTGRES_DB: medical_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d medical_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: oral-api
    environment:
      DATABASE_URL: postgresql+psycopg://user:password@postgres:5432/medical_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
